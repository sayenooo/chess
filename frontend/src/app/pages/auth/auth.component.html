<div class="auth-page">
  <div class="auth-card" [class.register-mode]="mode === 'register'">
    <div class="auth-logo">
      <span class="logo-icon">♔</span>
      <h1>KBTU Chess</h1>
      <p class="subtitle">Master the game of kings</p>
    </div>

    <div class="auth-tabs">
      <button class="tab" [class.active]="mode === 'login'" (click)="switchMode('login')">Sign In</button>
      <button class="tab" [class.active]="mode === 'register'" (click)="switchMode('register')">Sign Up</button>
    </div>

    @if (errorMessage) {
      <div class="message error-msg">{{ errorMessage }}</div>
    }
    @if (successMessage) {
      <div class="message success-msg">{{ successMessage }}</div>
    }

    @if (mode === 'login') {
      <form class="auth-form" (ngSubmit)="onLogin()">
        <div class="input-group">
          <label for="login-user">Username</label>
          <input id="login-user" type="text" [(ngModel)]="loginData.username" name="username"
                 placeholder="Enter your username" autocomplete="username">
        </div>
        <div class="input-group">
          <label for="login-pass">Password</label>
          <input id="login-pass" type="password" [(ngModel)]="loginData.password" name="password"
                 placeholder="Enter your password" autocomplete="current-password">
        </div>
        <button type="submit" class="submit-btn" [disabled]="loading">
          @if (loading) { <span class="spinner"></span> }
          @else { Sign In }
        </button>
      </form>
    }

    @if (mode === 'register') {
      <form class="auth-form" (ngSubmit)="onRegister()">
        <div class="input-group">
          <label for="reg-user">Username</label>
          <input id="reg-user" type="text" [(ngModel)]="registerData.username" name="username"
                 placeholder="Choose a username" autocomplete="username">
        </div>
        <div class="input-group">
          <label for="reg-email">Email</label>
          <input id="reg-email" type="email" [(ngModel)]="registerData.email" name="email"
                 placeholder="your@email.com" autocomplete="email">
        </div>
        <div class="input-group">
          <label for="reg-pass">Password</label>
          <input id="reg-pass" type="password" [(ngModel)]="registerData.password" name="password"
                 placeholder="Create a password" autocomplete="new-password">
        </div>
        <button type="submit" class="submit-btn" [disabled]="loading">
          @if (loading) { <span class="spinner"></span> }
          @else { Create Account }
        </button>
      </form>
    }
  </div>
</div>
